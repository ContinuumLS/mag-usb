services:
  host:
    build: .
    container_name: psws-gmag
    environment:
      - HW_PORT=1234
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8765:8765"
    restart: unless-stopped
    stdin_open: true
    tty: true
    volumes:
      # Persists edits to the config.toml file
      - ./src/config.toml:/app/config.toml
      # Persists .log files generated by the container
      - ./logs:/app/logs
  test:
    build:
      context: .
      dockerfile: ./tests/Dockerfile
    container_name: mag-test